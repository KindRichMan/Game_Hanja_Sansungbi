<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4자성어 산성비</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  position: relative;
  width: 90vw;
  height: 55vh;
  max-width: 400px;
  margin: auto;
  border: 3px solid white;
  overflow: hidden;
}

.word {
  position: absolute;
  font-size: 6vw;
  font-weight: bold;
}

.bar {
  width: 60vw;
  max-width: 200px;
  height: 20px;
  border: 1px solid white;
  margin: auto;
}

#hpBar {
  height: 100%;
  background: red;
}

#buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  width: 90vw;
  max-width: 400px;
  margin: auto;
}

.btn {
  padding: 10px;
  background: white;
  color: black;
}

.control {
  background: orange;
}

#display {
  height: 30px;
  margin: 10px;
}

#controls {
  margin: 10px;
}
</style>
</head>

<body>

<h2>🌧️ 4자성어 산성비</h2>

<div>
점수: <span id="score">0</span> |
콤보: <span id="combo">0</span>
</div>

<div class="bar"><div id="hpBar"></div></div>

<div id="controls">
난이도:
<select id="level">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5" selected>5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
</select>

<button onclick="startGame()">START</button>
<button onclick="stopGame()">STOP</button>
</div>

<div id="game"></div>
<div id="display"></div>
<div id="buttons"></div>

<input type="text" id="keyboardInput" placeholder="PC 입력">

<script>

const words = [
  { hanja: "四面楚歌", reading: "사면초가" },
  { hanja: "一石二鳥", reading: "일석이조" },
  { hanja: "自業自得", reading: "자업자득" },
  { hanja: "刻舟求劍", reading: "각주구검" },
  { hanja: "東問西答", reading: "동문서답" }
];

let activeWords = [];
let currentInput = "";
let score = 0;
let combo = 0;
let hp = 100;

let gameInterval;
let spawnInterval;
let speed = 1;

// 난이도 적용
function setSpeed() {
  const level = document.getElementById("level").value;
  speed = level * 0.3;
}

// 시작
function startGame() {
  stopGame();
  setSpeed();

  spawnInterval = setInterval(spawnWord, 1500);
  gameInterval = setInterval(update, 20);
}

// 정지
function stopGame() {
  clearInterval(spawnInterval);
  clearInterval(gameInterval);
}

// 버튼 글자
function getButtonChars() {
  let chars = [];

  activeWords.forEach(w => {
    w.data.reading.split("").forEach(c => {
      if (!chars.includes(c)) chars.push(c);
    });
  });

  while (chars.length < 12) {
    const rand = "가나다라마바사아자차카타파하"[Math.floor(Math.random()*14)];
    if (!chars.includes(rand)) chars.push(rand);
  }

  return chars.sort(() => Math.random() - 0.5);
}

// 버튼 생성
function createButtons() {
  const div = document.getElementById("buttons");
  div.innerHTML = "";

  getButtonChars().forEach(c => {
    const btn = document.createElement("button");
    btn.innerText = c;
    btn.className = "btn";
    btn.onclick = () => {
      currentInput += c;
      updateDisplay();
    };
    div.appendChild(btn);
  });

  ["지우기","확인"].forEach(name => {
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.className = "btn control";
    btn.onclick = () => {
      if(name==="지우기") currentInput=currentInput.slice(0,-1);
      else checkAnswer();
      updateDisplay();
    };
    div.appendChild(btn);
  });
}

function updateDisplay() {
  document.getElementById("display").innerText = currentInput;
}

function checkAnswer() {
  activeWords.forEach((w,i)=>{
    if(w.data.reading===currentInput){
      score+=10;
      combo++;
      document.getElementById("score").innerText=score;
      document.getElementById("combo").innerText=combo;
      w.el.remove();
      activeWords.splice(i,1);
      createButtons();
    }
  });
  currentInput="";
}

function spawnWord() {
  const data = words[Math.floor(Math.random()*words.length)];

  const el = document.createElement("div");
  el.className="word";
  el.innerText=data.hanja;

  el.style.left=Math.random()*80+"vw";
  el.style.top="0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({el,data,y:0});

  createButtons();
}

function update() {
  activeWords.forEach((w,i)=>{
    w.y+=speed;
    w.el.style.top=w.y+"px";

    if(w.y>window.innerHeight*0.55){
      hp-=10;
      combo=0;
      document.getElementById("combo").innerText=combo;

      w.el.remove();
      activeWords.splice(i,1);

      createButtons();
    }
  });
}

// 키보드 입력
document.getElementById("keyboardInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    currentInput=e.target.value.trim();
    checkAnswer();
    updateDisplay();
    e.target.value="";
  }
});

</script>

</body>
</html>
