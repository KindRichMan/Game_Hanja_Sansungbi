<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<!-- 🔥 모바일 핵심 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>성어 타자 게임</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: "궁서", serif;
  margin: 0;
  padding: 10px;
}

/* 🔥 게임 영역 */
#game {
  position: relative;
  width: 95vw;
  height: 55vh;
  margin: 10px auto;
  border: 3px solid white;
  overflow: hidden;
}

/* 🔥 글자 (반응형 핵심) */
.word {
  position: absolute;
  font-size: clamp(18px, 5vw, 40px);
  font-weight: bold;
}

/* 🔥 HP */
.bar {
  width: 80%;
  max-width: 300px;
  height: 20px;
  border: 1px solid white;
  margin: 10px auto;
}

#hpBar {
  height: 100%;
  background: red;
  width: 100%;
}

/* 🔥 타이머 */
#timer {
  font-size: 18px;
  margin: 5px;
}

/* 🔥 입력창 (핵심 개선) */
#keyboardInput {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 400px;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

/* 🔥 버튼 */
button {
  padding: 10px 15px;
  font-size: 14px;
  margin: 5px;
}

/* 🔥 랭킹 */
#rankingBox {
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>🌧️ 성어 타자 게임</h2>

<input id="nickname" placeholder="닉네임">

<div>
점수: <span id="score">0</span> |
콤보: <span id="combo">0</span>
</div>

<div id="timer"></div>

<div class="bar"><div id="hpBar"></div></div>

<div>
난이도:
<select id="level">
  <option value="1">1 (매우 쉬움)</option>
  <option value="2">2 (쉬움)</option>
  <option value="3" selected>3 (보통)</option>
  <option value="4">4 (어려움)</option>
  <option value="5">5 (매우 어려움)</option>
</select>

<br><br>

시간 설정:
<label><input type="radio" name="time" value="60"> 1분</label>
<label><input type="radio" name="time" value="0" checked> 무제한</label>

<br><br>

<button onclick="startGame()">START</button>
<button onclick="resetGame()">RESET</button>
</div>

<div id="game"></div>

<input id="keyboardInput" placeholder="뜻 입력 후 Enter">

<div id="rankingBox">
  <h3>🏆 TOP 10</h3>
  <div id="rankingList"></div>
</div>

<script type="module">

import { loadWords, saveScore, loadRanking } from "./firebase.js";

let words = [];
let activeWords = [];
let score = 0;
let combo = 0;
let hp = 100;
let speed = 1;
let nickname = "";

let gameInterval, spawnInterval, timerInterval;
let remainingTime = 0;

/* 🔥 단어 로드 */
loadWords().then(w => words = w);

/* 🔥 입력 + 모바일 자동 포커스 */
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("keyboardInput");

  input.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
      checkAnswer(e.target.value.trim());
      e.target.value="";
    }
  });

  input.focus(); // 🔥 모바일 UX 개선
});

/* 🔥 생성 속도 */
function getSpawnDelay(level){
  return [4000, 3200, 2500, 1800, 1200][level-1];
}

/* 🔥 속도 */
function getSpeed(level){
  return [0.2, 0.35, 0.5, 0.7, 1][level-1];
}

/* 🔥 시작 */
window.startGame = function(){

  nickname = document.getElementById("nickname").value.trim().toLowerCase();
  if(!nickname) return alert("닉네임 입력");

  stopGame();

  score = 0;
  combo = 0;
  hp = 100;
  activeWords = [];

  document.getElementById("score").innerText = 0;
  document.getElementById("combo").innerText = 0;

  const level = Number(document.getElementById("level").value);
  speed = getSpeed(level);

  spawnInterval = setInterval(spawnWord, getSpawnDelay(level));
  gameInterval = setInterval(update, 20);

  const timeOption = document.querySelector('input[name="time"]:checked').value;

  if(timeOption > 0){
    remainingTime = Number(timeOption);

    timerInterval = setInterval(()=>{
      remainingTime--;
      document.getElementById("timer").innerText = `⏱️ ${remainingTime}초`;

      if(remainingTime <= 0){
        gameOver();
      }
    },1000);
  }else{
    document.getElementById("timer").innerText = "♾️ 무제한";
  }

  document.getElementById("rankingBox").style.display="none";
}

/* 🔥 정지 */
function stopGame(){
  clearInterval(spawnInterval);
  clearInterval(gameInterval);
  clearInterval(timerInterval);
}

/* 🔥 단어 생성 */
function spawnWord(){
  if(words.length===0) return;

  const data = words[Math.floor(Math.random()*words.length)];

  const el = document.createElement("div");
  el.className="word";
  el.innerText=data.hanja;

  el.style.left=Math.random()*80+"%";
  el.style.top="0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({el,data,y:0});
}

/* 🔥 업데이트 */
function update(){
  activeWords.forEach((w,i)=>{
    w.y+=speed;
    w.el.style.top=w.y+"px";

    if(w.y > document.getElementById("game").offsetHeight - 50){
      hp -= 10;
      combo = 0;

      w.el.remove();
      activeWords.splice(i,1);

      if(hp <= 0) gameOver();
    }
  });

  document.getElementById("hpBar").style.width = hp + "%";
}

/* 🔥 정답 */
function checkAnswer(input){
  activeWords.forEach((w,i)=>{
    if(w.data.reading===input){
      score += 10;
      combo++;

      w.el.remove();
      activeWords.splice(i,1);
    }
  });

  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;
}

/* 🔥 종료 */
async function gameOver(){
  stopGame();

  await saveScore(nickname, score);
  const ranking = await loadRanking();

  showRanking(ranking);
}

/* 🔥 랭킹 */
function showRanking(ranking){
  const list = document.getElementById("rankingList");
  list.innerHTML = "";

  ranking.forEach((r,i)=>{
    const el = document.createElement("div");
    el.innerText = `${i+1}위 - ${r.nickname} (${r.score})`;
    list.appendChild(el);
  });

  document.getElementById("rankingBox").style.display="block";
}

/* 🔥 리셋 */
window.resetGame = function(){
  location.reload();
}

</script>

</body>
</html>
