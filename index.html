<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한자 산성비 게임</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  position: relative;
  width: 400px;
  height: 600px;
  margin: auto;
  border: 3px solid white;
  overflow: hidden;
  background: rgba(0,0,0,0.3);
}

.word {
  position: absolute;
  font-size: 28px;
  font-weight: bold;
}

#ui {
  margin: 10px;
}

.bar {
  width: 200px;
  height: 20px;
  border: 1px solid white;
  margin: auto;
}

#hpBar {
  height: 100%;
  background: red;
}
</style>
</head>

<body>

<h2>🌧️ 한자 산성비</h2>

<div id="ui">
  점수: <span id="score">0</span>
  <div class="bar"><div id="hpBar"></div></div>
</div>

<div id="game"></div>

<input type="text" id="input" placeholder="한글 입력 후 Enter">

<script>

const words = [
  { hanja: "水", korean: "물" },
  { hanja: "火", korean: "불" },
  { hanja: "木", korean: "나무" },
  { hanja: "金", korean: "금" },
  { hanja: "土", korean: "흙" }
];

let activeWords = [];
let hp = 100;
let score = 0;

function spawnWord() {
  const data = words[Math.floor(Math.random()*words.length)];
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = data.hanja;

  el.style.left = Math.random()*350 + "px";
  el.style.top = "0px";

  document.getElementById("game").appendChild(el);

  activeWords.push({ el, data, y:0 });
}

function update() {
  activeWords.forEach((w, i) => {
    w.y += 1;
    w.el.style.top = w.y + "px";

    if (w.y > 550) {
      hp -= 10;
      updateHP();

      w.el.remove();
      activeWords.splice(i,1);

      if (hp <= 0) {
        alert("게임 오버! 점수: " + score);
        location.reload();
      }
    }
  });
}

function updateHP() {
  document.getElementById("hpBar").style.width = hp + "%";
}

setInterval(spawnWord, 1500);
setInterval(update, 20);

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const input = e.target.value;

    activeWords.forEach((w, i) => {
      if (w.data.korean === input) {
        score += 10;
        document.getElementById("score").innerText = score;

        w.el.remove();
        activeWords.splice(i,1);
      }
    });

    e.target.value = "";
  }
});

</script>

</body>
</html>
