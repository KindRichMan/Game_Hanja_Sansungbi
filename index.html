<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4자성어 산성비</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: Arial;
}

/* 🟢 게임 영역 (PC 크게) */
#game {
  position: relative;
  width: 90vw;
  max-width: 800px;
  height: 70vh;
  margin: auto;
  border: 3px solid white;
  overflow: hidden;
}

/* 🟢 PC용 글자 */
.word {
  position: absolute;
  font-size: 40px;
  font-weight: bold;
}

/* HP */
.bar {
  width: 300px;
  height: 20px;
  border: 1px solid white;
  margin: auto;
}
#hpBar {
  height: 100%;
  background: red;
}

/* 입력 표시 */
#display {
  font-size: 24px;
  margin: 10px;
}

/* 버튼 (모바일용) */
#buttons {
  display: none;
}

/* PC 키보드 */
#keyboardInput {
  margin-top: 10px;
  padding: 10px;
  font-size: 18px;
  width: 300px;
}

/* 🎯 모바일 전용 */
@media (max-width: 768px) {

  .word {
    font-size: 6vw;
  }

  #game {
    height: 55vh;
  }

  #keyboardInput {
    display: none;
  }

  #buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    width: 90vw;
    margin: auto;
  }

  .btn {
    padding: 12px;
    font-size: 16px;
    background: white;
    color: black;
  }

  .control {
    background: orange;
  }
}
</style>
</head>

<body>

<h2>🌧️ 4자성어 산성비</h2>

<div>
점수: <span id="score">0</span> |
콤보: <span id="combo">0</span>
</div>

<div class="bar"><div id="hpBar"></div></div>

<div>
난이도:
<select id="level">
  <option value="1">1</option>
  <option value="3">3</option>
  <option value="5" selected>5</option>
  <option value="7">7</option>
  <option value="10">10</option>
</select>

<button onclick="startGame()">START</button>
<button onclick="stopGame()">STOP</button>
</div>

<div id="game"></div>

<div id="display"></div>

<!-- 모바일 버튼 -->
<div id="buttons"></div>

<!-- PC 입력 -->
<input type="text" id="keyboardInput" placeholder="사자성어 입력 후 Enter">

<script>

const words = [
  { hanja: "四面楚歌", reading: "사면초가" },
  { hanja: "一石二鳥", reading: "일석이조" },
  { hanja: "自業自得", reading: "자업자득" },
  { hanja: "刻舟求劍", reading: "각주구검" },
  { hanja: "東問西答", reading: "동문서답" }
];

let activeWords = [];
let currentInput = "";
let score = 0;
let combo = 0;
let hp = 100;

let gameInterval, spawnInterval;
let speed = 1;

/* 난이도 */
function setSpeed() {
  const level = document.getElementById("level").value;
  speed = level * 0.4;
}

/* 시작 */
function startGame() {
  stopGame();
  setSpeed();

  spawnInterval = setInterval(spawnWord, 1500);
  gameInterval = setInterval(update, 20);
}

/* 정지 */
function stopGame() {
  clearInterval(spawnInterval);
  clearInterval(gameInterval);
}

/* 단어 생성 */
function spawnWord() {
  const data = words[Math.floor(Math.random()*words.length)];

  const el = document.createElement("div");
  el.className="word";
  el.innerText=data.hanja;

  el.style.left=Math.random()*80+"%";
  el.style.top="0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({el,data,y:0});
}

/* 업데이트 */
function update() {
  activeWords.forEach((w,i)=>{
    w.y+=speed;
    w.el.style.top=w.y+"px";

    if(w.y > document.getElementById("game").offsetHeight - 50){
      hp -= 10;
      combo = 0;

      document.getElementById("combo").innerText = combo;
      updateHP();

      w.el.remove();
      activeWords.splice(i,1);
    }
  });
}

/* HP */
function updateHP() {
  document.getElementById("hpBar").style.width = hp + "%";
}

/* 정답 체크 */
function checkAnswer() {
  activeWords.forEach((w,i)=>{
    if(w.data.reading === currentInput){
      score += 10;
      combo++;

      document.getElementById("score").innerText = score;
      document.getElementById("combo").innerText = combo;

      w.el.remove();
      activeWords.splice(i,1);
    }
  });
  currentInput = "";
  updateDisplay();
}

/* 표시 */
function updateDisplay() {
  document.getElementById("display").innerText = currentInput;
}

/* PC 입력 */
document.getElementById("keyboardInput").addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    currentInput = e.target.value.trim();
    checkAnswer();
    e.target.value="";
  }
});

updateHP();

</script>

</body>
</html>
