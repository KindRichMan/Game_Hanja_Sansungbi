<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4자성어 산성비</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: "HYhaeseo", "궁서", serif;
}

#game {
  position: relative;
  width: 90vw;
  max-width: 900px;
  height: 70vh;
  margin: 20px auto;
  border: 3px solid white;
  overflow: hidden;
}

.word {
  position: absolute;
  font-size: clamp(22px, 4vw, 36px);
  font-weight: bold;
}

.bar {
  width: 60vw;
  max-width: 400px;
  height: 20px;
  border: 1px solid white;
  margin: auto;
}

#hpBar {
  height: 100%;
  background: red;
}

input {
  padding: 10px;
  margin: 10px;
}

#rankingBox {
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>🌧️ 4자성어 산성비</h2>

<!-- 닉네임 -->
<input id="nickname" placeholder="닉네임 입력">

<div>
점수: <span id="score">0</span> |
콤보: <span id="combo">0</span>
</div>

<div class="bar"><div id="hpBar"></div></div>

<div>
난이도:
<select id="level">
  <option value="1">1 (매우 쉬움)</option>
  <option value="2">2</option>
  <option value="3" selected>3</option>
  <option value="4">4</option>
  <option value="5">5 (어려움)</option>
</select>

<button onclick="startGame()">START</button>
<button onclick="stopGame()">STOP</button>
<button onclick="resetGame()">CLEAN</button>
</div>

<div id="game"></div>

<div id="display"></div>

<input type="text" id="keyboardInput" placeholder="뜻 입력 후 Enter">

<!-- 🔥 랭킹 -->
<div id="rankingBox">
  <h3>🏆 TOP 10</h3>
  <div id="rankingList"></div>
</div>

<script type="module">

import { loadWords, saveScore, loadRanking } from "./firebase.js";

let words = [];
let activeWords = [];
let currentInput = "";
let score = 0;
let combo = 0;
let hp = 100;

let gameInterval, spawnInterval;
let speed = 1;
let nickname = "";

/* 🔥 DOM 로딩 후 이벤트 등록 */
document.addEventListener("DOMContentLoaded", () => {

  const input = document.getElementById("keyboardInput");

  if (input) {
    input.addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        currentInput = e.target.value.trim();
        checkAnswer();
        e.target.value="";
      }
    });
  }

});

/* 🔥 데이터 로드 */
async function init() {
  words = await loadWords();
}
init();

/* 난이도 */
function setSpeed() {
  const level = document.getElementById("level").value;
  speed = level * 0.3;
}

/* 시작 */
window.startGame = function() {
  nickname = document.getElementById("nickname").value.trim();

  if (!nickname) {
    alert("닉네임 입력하세요");
    return;
  }

  document.getElementById("rankingBox").style.display = "none";

  stopGame();
  setSpeed();

  spawnInterval = setInterval(spawnWord, 1500);
  gameInterval = setInterval(update, 20);
}

/* 정지 */
window.stopGame = function() {
  clearInterval(spawnInterval);
  clearInterval(gameInterval);
}

/* 초기화 */
window.resetGame = function() {
  stopGame();

  activeWords.forEach(w => w.el.remove());
  activeWords = [];

  score = 0;
  combo = 0;
  hp = 100;
  currentInput = "";

  document.getElementById("score").innerText = 0;
  document.getElementById("combo").innerText = 0;
  document.getElementById("display").innerText = "";
  document.getElementById("keyboardInput").value = "";

  updateHP();
}

/* 단어 생성 */
function spawnWord() {
  if(words.length === 0) return;

  const data = words[Math.floor(Math.random()*words.length)];

  const el = document.createElement("div");
  el.className="word";
  el.innerText=data.hanja;

  el.style.left=Math.random()*80 + "%";
  el.style.top="0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({el,data,y:0});
}

/* 업데이트 */
function update() {
  activeWords.forEach((w,i)=>{
    w.y += speed;
    w.el.style.top = w.y + "px";

    if(w.y > document.getElementById("game").offsetHeight - 50){
      hp -= 10;
      combo = 0;

      document.getElementById("combo").innerText = combo;
      updateHP();

      w.el.remove();
      activeWords.splice(i,1);

      if(hp <= 0){
        gameOver();
      }
    }
  });
}

/* 게임 종료 */
async function gameOver() {
  stopGame();

  await saveScore(nickname, score);
  const ranking = await loadRanking();

  showRanking(ranking);
}

/* 랭킹 표시 */
function showRanking(ranking) {
  const box = document.getElementById("rankingBox");
  const list = document.getElementById("rankingList");

  list.innerHTML = "";

  ranking.forEach((r, i) => {
    const el = document.createElement("div");

    if (r.nickname === nickname && r.score === score) {
      el.innerHTML = `⭐ ${i+1}위 - ${r.nickname} (${r.score})`;
      el.style.color = "yellow";
      el.style.fontWeight = "bold";
    } else {
      el.innerText = `${i+1}위 - ${r.nickname} (${r.score})`;
    }

    list.appendChild(el);
  });

  box.style.display = "block";
}

/* HP */
function updateHP() {
  document.getElementById("hpBar").style.width = hp + "%";
}

/* 정답 체크 */
function checkAnswer() {
  activeWords.forEach((w,i)=>{
    if(w.data.reading === currentInput){
      score += 10;
      combo++;

      document.getElementById("score").innerText = score;
      document.getElementById("combo").innerText = combo;

      w.el.remove();
      activeWords.splice(i,1);
    }
  });

  currentInput = "";
  document.getElementById("display").innerText = "";
}

updateHP();

</script>

</body>
</html>
