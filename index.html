<script type="module">

import { loadWords, saveScore, loadRanking } from "./firebase.js";

let words = [];
let activeWords = [];
let currentInput = "";
let score = 0;
let combo = 0;
let hp = 100;

let gameInterval, spawnInterval;
let speed = 1;
let nickname = "";

/* 🔥 초기 데이터 로드 */
async function init() {
  words = await loadWords();
}

init();

/* 🔥 난이도 */
function setSpeed() {
  const level = document.getElementById("level").value;
  speed = level * 0.3;
}

/* 🔥 시작 */
window.startGame = function() {
  nickname = document.getElementById("nickname").value.trim();

  if (!nickname) {
    alert("닉네임 입력하세요");
    return;
  }

  document.getElementById("rankingBox").style.display = "none";

  stopGame();
  setSpeed();

  spawnInterval = setInterval(spawnWord, 1500);
  gameInterval = setInterval(update, 20);
}

/* 🔥 정지 */
window.stopGame = function() {
  clearInterval(spawnInterval);
  clearInterval(gameInterval);
}

/* 🔥 초기화 */
window.resetGame = function() {
  stopGame();

  activeWords.forEach(w => w.el.remove());
  activeWords = [];

  score = 0;
  combo = 0;
  hp = 100;
  currentInput = "";

  document.getElementById("score").innerText = 0;
  document.getElementById("combo").innerText = 0;
  document.getElementById("display").innerText = "";
  document.getElementById("keyboardInput").value = "";

  updateHP();
}

/* 🔥 단어 생성 */
function spawnWord() {
  if(words.length === 0) return;

  const data = words[Math.floor(Math.random()*words.length)];

  const el = document.createElement("div");
  el.className="word";
  el.innerText=data.hanja;

  el.style.left=Math.random()*80 + "%";
  el.style.top="0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({el,data,y:0});
}

/* 🔥 업데이트 */
function update() {
  activeWords.forEach((w,i)=>{
    w.y += speed;
    w.el.style.top = w.y + "px";

    if(w.y > document.getElementById("game").offsetHeight - 50){
      hp -= 10;
      combo = 0;

      document.getElementById("combo").innerText = combo;
      updateHP();

      w.el.remove();
      activeWords.splice(i,1);

      if(hp <= 0){
        gameOver();
      }
    }
  });
}

/* 🔥 게임 종료 */
async function gameOver() {
  stopGame();

  await saveScore(nickname, score);
  const ranking = await loadRanking();

  showRanking(ranking);
}

/* 🔥 랭킹 표시 */
function showRanking(ranking) {
  const box = document.getElementById("rankingBox");
  const list = document.getElementById("rankingList");

  list.innerHTML = "";

  ranking.forEach((r, i) => {
    const el = document.createElement("div");

    if (r.nickname === nickname && r.score === score) {
      el.innerHTML = `⭐ ${i+1}위 - ${r.nickname} (${r.score})`;
      el.style.color = "yellow";
      el.style.fontWeight = "bold";
    } else {
      el.innerText = `${i+1}위 - ${r.nickname} (${r.score})`;
    }

    list.appendChild(el);
  });

  box.style.display = "block";
}

/* 🔥 HP */
function updateHP() {
  document.getElementById("hpBar").style.width = hp + "%";
}

/* 🔥 정답 체크 */
function checkAnswer() {
  activeWords.forEach((w,i)=>{
    if(w.data.reading === currentInput){
      score += 10;
      combo++;

      document.getElementById("score").innerText = score;
      document.getElementById("combo").innerText = combo;

      w.el.remove();
      activeWords.splice(i,1);
    }
  });

  currentInput = "";
  updateDisplay();
}

/* 🔥 표시 */
function updateDisplay() {
  document.getElementById("display").innerText = currentInput;
}

/* 🔥 입력 */
document.getElementById("keyboardInput").addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    currentInput = e.target.value.trim();
    checkAnswer();
    e.target.value="";
  }
});

updateHP();

</script>
