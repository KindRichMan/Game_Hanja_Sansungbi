<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4자성어 산성비 게임</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  position: relative;
  width: 90vw;
  height: 60vh;
  max-width: 400px;
  margin: auto;
  border: 3px solid white;
  overflow: hidden;
  background: rgba(0,0,0,0.3);
}

.word {
  position: absolute;
  font-size: 6vw;
  font-weight: bold;
}

.bar {
  width: 60vw;
  max-width: 200px;
  height: 20px;
  border: 1px solid white;
  margin: auto;
}

#hpBar {
  height: 100%;
  background: red;
}

#combo {
  color: yellow;
}

#display {
  margin: 10px;
  font-size: 22px;
  height: 30px;
}

#buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  width: 90vw;
  max-width: 400px;
  margin: auto;
}

.btn {
  padding: 10px;
  font-size: 16px;
  background: white;
  color: black;
  border-radius: 5px;
}

.control {
  background: orange;
}
</style>
</head>

<body>

<h2>🌧️ 4자성어 산성비</h2>

<div>
  점수: <span id="score">0</span> |
  콤보: <span id="combo">0</span>
</div>

<div class="bar"><div id="hpBar"></div></div>

<div id="game"></div>

<div id="display"></div>

<div id="buttons"></div>

<script>

// 🔊 효과음
function playSound(url) {
  try {
    const audio = new Audio(url);
    audio.play().catch(()=>{});
  } catch(e){}
}

// 🎯 데이터
const words = [
  { hanja: "四面楚歌", reading: "사면초가" },
  { hanja: "一石二鳥", reading: "일석이조" },
  { hanja: "自業自得", reading: "자업자득" },
  { hanja: "刻舟求劍", reading: "각주구검" },
  { hanja: "東問西答", reading: "동문서답" },
  { hanja: "畫龍點睛", reading: "화룡점정" },
  { hanja: "塞翁之馬", reading: "새옹지마" },
  { hanja: "井底之蛙", reading: "정저지와" },
  { hanja: "狐假虎威", reading: "호가호위" },
  { hanja: "指鹿爲馬", reading: "지록위마" }
];

let activeWords = [];
let hp = 100;
let score = 0;
let combo = 0;
let speed = 1;
let currentInput = "";

// 🔀 셔플 함수
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// 🎲 랜덤 글자 생성
function getRandomChars() {
  let allChars = [];

  words.forEach(w => {
    w.reading.split("").forEach(c => {
      if (!allChars.includes(c)) {
        allChars.push(c);
      }
    });
  });

  return shuffle(allChars).slice(0, 20);
}

// 🔘 버튼 생성
function createButtons() {
  const buttonsDiv = document.getElementById("buttons");
  buttonsDiv.innerHTML = "";

  const chars = getRandomChars();

  chars.forEach(c => {
    const btn = document.createElement("button");
    btn.innerText = c;
    btn.className = "btn";
    btn.onclick = () => {
      currentInput += c;
      updateDisplay();
    };
    buttonsDiv.appendChild(btn);
  });

  ["지우기","확인"].forEach(name => {
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.className = "btn control";

    btn.onclick = () => {
      if (name === "지우기") {
        currentInput = currentInput.slice(0, -1);
      } else {
        checkAnswer();
      }
      updateDisplay();
    };

    buttonsDiv.appendChild(btn);
  });
}

// 📺 입력 표시
function updateDisplay() {
  document.getElementById("display").innerText = currentInput;
}

// ✅ 정답 체크
function checkAnswer() {
  activeWords.forEach((w, i) => {
    if (w.data.reading === currentInput) {
      combo++;
      score += 10 * combo;

      document.getElementById("score").innerText = score;
      document.getElementById("combo").innerText = combo;

      playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

      w.el.remove();
      activeWords.splice(i,1);
    }
  });

  currentInput = "";
}

// 🟢 단어 생성
function spawnWord() {
  const data = words[Math.floor(Math.random()*words.length)];
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = data.hanja;

  el.style.left = Math.random()*80 + "vw";
  el.style.top = "0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({ el, data, y:0 });
}

// 🔄 업데이트
function update() {
  activeWords.forEach((w, i) => {
    w.y += speed;
    w.el.style.top = w.y + "px";

    if (w.y > window.innerHeight * 0.6) {
      hp -= 10;
      combo = 0;
      document.getElementById("combo").innerText = combo;

      playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

      updateHP();

      w.el.remove();
      activeWords.splice(i,1);

      if (hp <= 0) {
        alert("게임 오버! 점수: " + score);
        location.reload();
      }
    }
  });
}

// ❤️ HP
function updateHP() {
  document.getElementById("hpBar").style.width = hp + "%";
}

// 실행
setInterval(() => {
  spawnWord();
  speed += 0.03;
}, 1500);

setInterval(update, 20);

updateHP();
createButtons();

</script>

</body>
</html>
