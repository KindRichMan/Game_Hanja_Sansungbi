<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성어 타자 게임</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: "궁서", serif;
  margin: 0;
  padding-bottom: 90px; /* 입력창 공간 확보 */
}

/* 게임 영역 */
#game {
  position: relative;
  width: 95vw;
  height: 55dvh; /* 🔥 핵심 (vh → dvh) */
  margin: 10px auto;
  border: 3px solid white;
  overflow: hidden;
}

/* 단어 */
.word {
  position: absolute;
  font-size: clamp(18px, 5vw, 40px);
  font-weight: bold;
}

/* HP 바 */
.bar {
  width: 80%;
  height: 20px;
  border: 1px solid white;
  margin: 10px auto;
}

#hpBar {
  height: 100%;
  background: red;
  width: 100%;
}

/* 버튼 */
button {
  padding: 10px 15px;
  margin: 5px;
  font-size: 14px;
}

/* 입력창 (🔥 핵심) */
#keyboardInput {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 15px;
  font-size: 16px;
  border: none;
  outline: none;
  z-index: 999;
}

/* 닉네임 */
#nickname {
  padding: 10px;
  width: 60%;
  max-width: 300px;
}

/* 랭킹 */
#rankingBox {
  display: none;
  margin-top: 10px;
}

#rankingList div {
  margin: 5px;
}
</style>
</head>

<body>

<h2>🌧️ 성어 타자 게임</h2>

<input id="nickname" placeholder="닉네임">

<div>
점수: <span id="score">0</span> |
콤보: <span id="combo">0</span>
</div>

<div class="bar"><div id="hpBar"></div></div>

<div>
난이도:
<select id="level">
  <option value="1">1 (매우 쉬움)</option>
  <option value="2">2</option>
  <option value="3" selected>3</option>
  <option value="4">4</option>
  <option value="5">5 (어려움)</option>
</select>

<button onclick="startGame()">START</button>
<button onclick="resetGame()">RESET</button>
</div>

<div id="game"></div>

<div id="rankingBox">
  <h3>🏆 TOP 10</h3>
  <div id="rankingList"></div>
</div>

<input id="keyboardInput" placeholder="뜻 입력 후 Enter">

<script type="module">
import { loadWords, saveScore, loadRanking } from "./firebase.js";

let words = [];
let activeWords = [];
let score = 0;
let combo = 0;
let hp = 100;
let speed = 1;
let nickname = "";

let gameInterval, spawnInterval;

/* 🔥 초기 설정 */
document.addEventListener("DOMContentLoaded", () => {

  const input = document.getElementById("keyboardInput");

  input.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
      checkAnswer(e.target.value.trim());
      e.target.value="";
    }
  });

  /* 🔥 모바일 입력 UX 개선 */
  input.addEventListener("focus", () => {
    setTimeout(() => {
      input.scrollIntoView({ behavior: "smooth" });
    }, 300);
  });

  updateHP();
});

/* 단어 로드 */
loadWords().then(w => words = w);

/* 생성 속도 */
function getSpawnDelay(level){
  return [3000,2500,2000,1500,1200][level-1];
}

/* 시작 */
window.startGame = function(){

  nickname = document.getElementById("nickname").value.trim().toLowerCase();

  if(!nickname) return alert("닉네임 입력");

  stopGame();

  score = 0;
  combo = 0;
  hp = 100;
  activeWords = [];

  document.getElementById("score").innerText = 0;
  document.getElementById("combo").innerText = 0;

  const level = Number(document.getElementById("level").value);

  speed = level * 0.3;

  spawnInterval = setInterval(spawnWord, getSpawnDelay(level));
  gameInterval = setInterval(update, 20);

  document.getElementById("rankingBox").style.display="none";

  document.getElementById("keyboardInput").focus();
}

/* 정지 */
function stopGame(){
  clearInterval(spawnInterval);
  clearInterval(gameInterval);
}

/* 단어 생성 */
function spawnWord(){
  if(words.length===0) return;

  const data = words[Math.floor(Math.random()*words.length)];

  const el = document.createElement("div");
  el.className="word";
  el.innerText=data.hanja;

  el.style.left=Math.random()*80+"%";
  el.style.top="0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({el,data,y:0});
}

/* 업데이트 */
function update(){
  activeWords.forEach((w,i)=>{
    w.y+=speed;
    w.el.style.top=w.y+"px";

    if(w.y > document.getElementById("game").offsetHeight - 50){
      hp -= 10;
      combo = 0;

      w.el.remove();
      activeWords.splice(i,1);

      if(hp <= 0) gameOver();
    }
  });

  updateHP();
}

/* HP */
function updateHP(){
  const bar = document.getElementById("hpBar");
  bar.style.width = hp + "%";
}

/* 정답 체크 */
function checkAnswer(input){
  activeWords.forEach((w,i)=>{
    if(w.data.reading===input){
      score += 10;
      combo++;

      w.el.remove();
      activeWords.splice(i,1);
    }
  });

  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;
}

/* 게임 종료 */
async function gameOver(){

  stopGame();

  await saveScore(nickname, score);
  const ranking = await loadRanking();

  showRanking(ranking);
}

/* 랭킹 표시 */
function showRanking(ranking){

  const list = document.getElementById("rankingList");
  list.innerHTML = "";

  ranking.forEach((r,i)=>{

    const el = document.createElement("div");

    if(i===0){
      el.innerHTML=`👑 1위 - ${r.nickname} (${r.score})`;
      el.style.color="gold";
    }
    else if(r.nickname===nickname){
      el.innerHTML=`⭐ ${i+1}위 - ${r.nickname} (${r.score})`;
      el.style.color="yellow";
    }
    else{
      el.innerText=`${i+1}위 - ${r.nickname} (${r.score})`;
    }

    list.appendChild(el);
  });

  document.getElementById("rankingBox").style.display="block";
}

/* 리셋 */
window.resetGame = function(){
  location.reload();
}
</script>

</body>
</html>
