<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4자성어 산성비 게임</title>

<style>
body {
  background: linear-gradient(#001f3f, #0074D9);
  color: white;
  text-align: center;
  font-family: Arial;
}

/* 게임 영역 */
#game {
  position: relative;
  width: 90vw;
  height: 60vh;
  max-width: 400px;
  margin: auto;
  border: 3px solid white;
  overflow: hidden;
  background: rgba(0,0,0,0.3);
}

.word {
  position: absolute;
  font-size: 6vw;
  font-weight: bold;
}

.bar {
  width: 60vw;
  max-width: 200px;
  height: 20px;
  border: 1px solid white;
  margin: auto;
}

#hpBar {
  height: 100%;
  background: red;
}

#combo {
  color: yellow;
}

/* 입력 표시 */
#display {
  margin: 10px;
  font-size: 20px;
  height: 30px;
}

/* 버튼 영역 */
#buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  width: 90vw;
  max-width: 400px;
  margin: auto;
}

.btn {
  padding: 10px;
  font-size: 16px;
  background: white;
  color: black;
  border-radius: 5px;
}

.control {
  background: orange;
}
</style>
</head>

<body>

<h2>🌧️ 4자성어 산성비</h2>

<div>
  점수: <span id="score">0</span> |
  콤보: <span id="combo">0</span>
</div>

<div class="bar"><div id="hpBar"></div></div>

<div id="game"></div>

<div id="display"></div>

<div id="buttons"></div>

<script>

function playSound(url) {
  try {
    const audio = new Audio(url);
    audio.play().catch(()=>{});
  } catch(e){}
}

const words = [
  { hanja: "四面楚歌", reading: "사면초가" },
  { hanja: "一石二鳥", reading: "일석이조" },
  { hanja: "自業自得", reading: "자업자득" },
  { hanja: "刻舟求劍", reading: "각주구검" },
  { hanja: "東問西答", reading: "동문서답" },
  { hanja: "畫龍點睛", reading: "화룡점정" },
  { hanja: "塞翁之馬", reading: "새옹지마" },
  { hanja: "井底之蛙", reading: "정저지와" },
  { hanja: "狐假虎威", reading: "호가호위" },
  { hanja: "指鹿爲馬", reading: "지록위마" }
];

let activeWords = [];
let hp = 100;
let score = 0;
let combo = 0;
let speed = 1;

let currentInput = "";

// 버튼용 글자 풀
const chars = ["사","면","초","가","일","석","이","조","자","업","득","각","주","구","검","동","문","서","답"];

// 버튼 생성
const buttonsDiv = document.getElementById("buttons");

chars.forEach(c => {
  const btn = document.createElement("button");
  btn.innerText = c;
  btn.className = "btn";
  btn.onclick = () => {
    currentInput += c;
    updateDisplay();
  };
  buttonsDiv.appendChild(btn);
});

// 컨트롤 버튼
["지우기","확인"].forEach(name => {
  const btn = document.createElement("button");
  btn.innerText = name;
  btn.className = "btn control";

  btn.onclick = () => {
    if (name === "지우기") {
      currentInput = currentInput.slice(0, -1);
    } else {
      checkAnswer();
    }
    updateDisplay();
  };

  buttonsDiv.appendChild(btn);
});

// 표시 업데이트
function updateDisplay() {
  document.getElementById("display").innerText = currentInput;
}

// 정답 체크
function checkAnswer() {
  activeWords.forEach((w, i) => {
    if (w.data.reading === currentInput) {
      combo++;
      score += 10 * combo;

      document.getElementById("score").innerText = score;
      document.getElementById("combo").innerText = combo;

      playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

      w.el.remove();
      activeWords.splice(i,1);
    }
  });

  currentInput = "";
}

// 단어 생성
function spawnWord() {
  const data = words[Math.floor(Math.random()*words.length)];
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = data.hanja;

  el.style.left = Math.random()*80 + "vw";
  el.style.top = "0px";

  document.getElementById("game").appendChild(el);
  activeWords.push({ el, data, y:0 });
}

// 업데이트
function update() {
  activeWords.forEach((w, i) => {
    w.y += speed;
    w.el.style.top = w.y + "px";

    if (w.y > window.innerHeight * 0.6) {
      hp -= 10;
      combo = 0;
      document.getElementById("combo").innerText = combo;

      playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

      updateHP();

      w.el.remove();
      activeWords.splice(i,1);

      if (hp <= 0) {
        alert("게임 오버! 점수: " + score);
        location.reload();
      }
    }
  });
}

function updateHP() {
  document.getElementById("hpBar").style.width = hp + "%";
}

setInterval(() => {
  spawnWord();
  speed += 0.03;
}, 1500);

setInterval(update, 20);

updateHP();

</script>

</body>
</html>
