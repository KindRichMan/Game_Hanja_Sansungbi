<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사자성어 관리자</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
}

/* 버튼 */
button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

/* 입력 영역 */
.input-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.input-box {
  display: flex;
  flex-direction: column;
}

input {
  padding: 10px;
  margin: 5px;
  width: 250px;
}

/* 리스트 UI */
#list {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  width: 300px;
  padding: 10px;
  margin: 5px;
  border: 1px solid #ddd;
  border-radius: 10px;
  text-align: left;
  background: #f9f9f9;
}
</style>
</head>

<body>

<h2>📌 사자성어 등록</h2>

<!-- 🔥 버튼 영역 -->
<div>
  <button id="loginBtn" onclick="login()">🔐 로그인</button>
  <button id="logoutBtn" onclick="logout()" style="display:none;">🚪 로그아웃</button>
  <button id="loadBtn" onclick="loadList()" style="display:none;">📋 데이터 조회</button>
</div>

<p id="result"></p>

<hr>

<!-- 🔥 입력 + 추가 버튼 -->
<div class="input-row">

  <div class="input-box">
    <input id="hanja" placeholder="한자 (예: 四面楚歌)">
    <input id="reading" placeholder="뜻 (예: 사면초가)">
  </div>

  <div>
    <button onclick="addWord()">추가</button>
  </div>

</div>

<!-- 🔥 리스트 -->
<div id="list"></div>

<script type="module">

import { auth, provider, signInWithPopup } from "./firebase.js";
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

let user = null;

// 관리자 이메일
const admins = [
  "anghks12@gmail.com",
  "파트너이메일@gmail.com"
];

// UI 업데이트
function updateUI() {
  if(user){
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "inline-block";
    document.getElementById("loadBtn").style.display = "inline-block";
  } else {
    document.getElementById("loginBtn").style.display = "inline-block";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("loadBtn").style.display = "none";
  }
}

// 로그인
window.login = async function() {
  try {
    const result = await signInWithPopup(auth, provider);
    user = result.user;

    document.getElementById("result").innerText =
      "로그인됨: " + user.email;

    updateUI();

  } catch (error) {
    alert("로그인 실패: " + error.message);
  }
}

// 로그아웃
window.logout = async function() {
  await signOut(auth);
  user = null;

  document.getElementById("result").innerText = "로그아웃됨";
  document.getElementById("list").innerHTML = "";

  updateUI();
}

// 추가
window.addWord = async function() {

  if(!user){
    alert("로그인 필요");
    return;
  }

  if(!admins.includes(user.email)){
    alert("관리자만 가능");
    return;
  }

  const hanja = document.getElementById("hanja").value.trim();
  const reading = document.getElementById("reading").value.trim();

  if(!hanja || !reading){
    alert("입력하세요");
    return;
  }

  await addDoc(collection(db, "words"), { hanja, reading });

  document.getElementById("hanja").value = "";
  document.getElementById("reading").value = "";

  alert("저장 완료");
}

// 데이터 조회
window.loadList = async function() {

  if(!user){
    alert("로그인 필요");
    return;
  }

  const snapshot = await getDocs(collection(db, "words"));

  let html = "<h3>📚 저장된 사자성어</h3>";

  snapshot.forEach(doc => {
    const data = doc.data();

    html += `
      <div class="card">
        <div><b>${data.hanja}</b></div>
        <div>${data.reading}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// 초기 UI
updateUI();

</script>

</body>
</html>
