<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사자성어 관리자</title>

<style>
body { font-family: sans-serif; text-align:center; padding:20px; }
button { margin:3px; padding:5px 10px; cursor:pointer; }
.card {
  border:1px solid #ddd;
  padding:10px;
  margin:5px auto;
  width:320px;
  border-radius:10px;
  text-align:left;
}
input { padding:5px; margin:3px; }
#progress { margin:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>📌 사자성어 관리자</h2>

<div>
  <button id="loginBtn">로그인</button>
  <button id="logoutBtn" style="display:none;">로그아웃</button>
  <button id="loadBtn">조회</button>
  <button id="deleteAllBtn" style="display:none;">전체삭제</button>
</div>

<p id="result"></p>

<hr>

<input id="search" placeholder="검색">
<button id="searchBtn">검색</button>

<hr>

<div id="adminArea" style="display:none;">
  <input type="file" id="csvFile">
  <button id="uploadBtn">CSV 업로드</button>
  <div id="progress"></div>

  <hr>

  <input id="hanja" placeholder="한자">
  <input id="reading" placeholder="뜻">
  <button id="addBtn">추가</button>
</div>

<hr>

<div id="list"></div>

<script type="module">

import { auth, provider } from "./firebase.js";
import { signInWithRedirect, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  doc, setDoc, getDocs, deleteDoc, collection, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { db } from "./firebase.js";

/* 관리자 */
const admins = ["anghks12@gmail.com","dolsaen@gmail.com"];

let user = null;
let allData = [];
let currentPage = 1;
const pageSize = 20;

/* DOM */
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const result = document.getElementById("result");
const adminArea = document.getElementById("adminArea");
const deleteAllBtn = document.getElementById("deleteAllBtn");

/* 로그인 중복 방지 */
let isRedirecting = false;

/* 로그인 버튼 */
loginBtn.onclick = async () => {
  if (isRedirecting) return;
  isRedirecting = true;

  await signInWithRedirect(auth, provider);
};

/* 로그인 상태 감지 */
onAuthStateChanged(auth, (u) => {
  if (u) {
    user = u;
    initUI();
  } else {
    user = null;
  }
});

/* UI 초기화 */
function initUI() {
  result.innerText = user.email;

  loginBtn.style.display = "none";
  logoutBtn.style.display = "inline";

  if (isAdmin()) {
    adminArea.style.display = "block";
    deleteAllBtn.style.display = "inline";
  }
}

/* 관리자 체크 */
function isAdmin() {
  return user && admins.includes(user.email);
}

/* 로그아웃 */
logoutBtn.onclick = async () => {
  await signOut(auth);
  location.reload();
};

/* 조회 */
document.getElementById("loadBtn").onclick = async () => {
  const snap = await getDocs(collection(db, "words"));

  allData = [];
  snap.forEach(d => allData.push(d.data()));

  currentPage = 1;
  render(allData);
};

/* 검색 */
document.getElementById("searchBtn").onclick = () => {
  const keyword = document.getElementById("search").value;

  const filtered = allData.filter(d =>
    d.hanja.includes(keyword) || d.reading.includes(keyword)
  );

  currentPage = 1;
  render(filtered);
};

/* 렌더 */
function render(data) {
  const start = (currentPage - 1) * pageSize;
  const pageData = data.slice(start, start + pageSize);

  let html = "";

  pageData.forEach(d => {
    html += `
    <div class="card">
      <input value="${d.hanja}" id="h_${d.hanja}">
      <input value="${d.reading}" id="r_${d.hanja}">
      ${isAdmin() ? `
        <button onclick="updateWord('${d.hanja}')">수정</button>
        <button onclick="deleteWord('${d.hanja}')">삭제</button>
      ` : ""}
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

/* 전역 함수 */
window.updateWord = async (id) => {
  if (!isAdmin()) return;

  const h = document.getElementById("h_" + id).value;
  const r = document.getElementById("r_" + id).value;

  await setDoc(doc(db, "words", h), { hanja: h, reading: r });
};

window.deleteWord = async (id) => {
  if (!isAdmin()) return;

  if (!confirm("삭제하시겠습니까?")) return;

  await deleteDoc(doc(db, "words", id));
  document.getElementById("loadBtn").click();
};

/* 전체 삭제 */
deleteAllBtn.onclick = async () => {
  if (!confirm("전체 삭제하시겠습니까?")) return;

  const snap = await getDocs(collection(db, "words"));

  let batch = writeBatch(db);

  snap.forEach(d => {
    batch.delete(d.ref);
  });

  await batch.commit();

  alert("전체 삭제 완료");
};

</script>

</body>
</html>
