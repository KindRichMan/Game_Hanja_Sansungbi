<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자</title>

<style>
body { font-family: sans-serif; text-align:center; padding:20px; }
button { margin:3px; padding:5px 10px; cursor:pointer; }

.card {
  border:1px solid #ddd;
  padding:10px;
  margin:5px auto;
  width:320px;
  border-radius:10px;
  text-align:left;
}

input { padding:5px; margin:3px; }

#progress { margin:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>📌관리자 사이트 </h2>

<div>
  <button id="loginBtn" onclick="login()">로그인</button>
  <button id="logoutBtn" onclick="logout()" style="display:none;">로그아웃</button>
  <button onclick="loadList()">조회</button>
  <button id="deleteLogsBtn" onclick="deleteAllLogs()" style="display:none;">로그 전체 삭제</button>
  <button id="deleteAllBtn" onclick="deleteAll()" style="display:none;">전체삭제</button>
</div>

<p id="result"></p>

<hr>

<input id="search" placeholder="검색">
<button onclick="searchList()">검색</button>

<hr>

<div id="adminArea" style="display:none;">
  <input type="file" id="csvFile">
  <button onclick="uploadCSV()">CSV 업로드</button>
  <div id="progress"></div>

  <hr>

  <input id="hanja" placeholder="한자">
  <input id="reading" placeholder="뜻">
  <button onclick="addWord()">추가</button>
</div>

<hr>

<div id="list"></div>

<script type="module">

import { auth, provider, signInWithPopup } from "./firebase.js";
import { db } from "./firebase.js";
import { doc, setDoc, getDocs, deleteDoc, collection, writeBatch, addDoc  } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 관리자 */
const admins = ["anghks12@gmail.com","dolsaen@gmail.com"];
const superAdmin = "anghks12@gmail.com";

let user=null;
let allData=[];
let currentViewData=[];

/* 페이징 */
let currentPage = 1;
const pageSize = 20;

/* 관리자 체크 */
function isAdmin(){
  return user && admins.includes(user.email);
}

/* 로그인 */
window.login = async () => {

  console.log("로그인 클릭됨");

  await saveLog("로그인 시도");

  try {
    const res = await signInWithPopup(auth, provider);
    user = res.user;

    if(!admins.includes(user.email)){

      await saveLog("허용되지 않은 로그인", user);

      alert("허용된 계정만 접근 가능합니다");

      await signOut(auth);
      user = null;
      return;
    }

    // 👉 관리자 로그인
    await saveLog("로그인 성공", user);

    result.innerText = user.email;

    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";

    adminArea.style.display = "block";
    deleteAllBtn.style.display = "inline";

    // 🔥 슈퍼 관리자만 버튼 표시
    if (user.email === superAdmin) {
      deleteLogsBtn.style.display = "inline";
    }

  } catch (err) {

    console.error("로그인 실패:", err);

    await saveLog("로그인 실패", null);

    alert("로그인 실패");
  }
};

async function getClientInfo(){
  try{
    const res = await fetch("https://ipapi.co/json/");
    return await res.json();
  }catch(e){
    console.log("IP 조회 실패", e);
    return {};
  }
}

/* 로그 저장 함수 추가 */


async function saveLog(type, userData=null){
  if (!userData) return;

  const info = await getClientInfo();

  await addDoc(collection(db, "logs"), {
    type, // visit / login

    email: userData?.email || null,
    uid: userData?.uid || null,

    ip: info.ip || null,
    country: info.country_name || null,
    city: info.city || null,

    userAgent: navigator.userAgent,

    time: new Date()
  });
}

window.addEventListener("load", ()=>{
 // saveLog("방문");
});

/* 로그아웃 */
window.logout=async()=>{
  await signOut(auth);
  location.reload();
}


/* 로그 전체 삭제 함수 추가 */

window.deleteAllLogs = async () => {

  // 🔥 나만 가능
  if(user?.email !== superAdmin){
    alert("권한 없음");
    return;
  }

  if(!confirm("전체 로그를 삭제하시겠습니까?")) return;

  const snap = await getDocs(collection(db, "logs"));

  let batch = writeBatch(db);
  let count = 0;

  for(const d of snap.docs){

    batch.delete(d.ref);
    count++;

    // 🔥 400개씩 끊어서 삭제
    if(count % 400 === 0){
      await batch.commit();
      batch = writeBatch(db);
    }
  }

  await batch.commit();

  alert(`로그 삭제 완료: ${count}개`);
};


/* 조회 */
window.loadList=async()=>{

  // 🔥 로그인 + 관리자 체크
  if(!isAdmin()){
    alert("관리자 로그인 후 이용 가능합니다");
    return;
  }

  const snap=await getDocs(collection(db,"words"));

  allData=[];
  snap.forEach(d=>allData.push(d.data()));

  currentPage = 1;
  render(allData);
}

/* 검색 */
window.searchList=()=>{

  if(!isAdmin()){
    alert("관리자만 검색 가능합니다");
    return;
  }

  const keyword=search.value.trim();

  const filtered=allData.filter(d=>
    d.hanja.includes(keyword) || d.reading.includes(keyword)
  );

  currentPage = 1;
  render(filtered);
}

/* 렌더 */
function render(data){
  currentViewData = data;

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;

  const pageData = data.slice(start, end);

  list.textContent = "";

  pageData.forEach(d=>{
    const card = document.createElement("div");
    card.className = "card";

    const hanjaInput = document.createElement("input");
    hanjaInput.value = d.hanja || "";
    hanjaInput.readOnly = !isAdmin();

    const readingInput = document.createElement("input");
    readingInput.value = d.reading || "";
    readingInput.readOnly = !isAdmin();

    card.appendChild(hanjaInput);
    card.appendChild(readingInput);

    if (isAdmin()) {
      const updateButton = document.createElement("button");
      updateButton.type = "button";
      updateButton.textContent = "수정";
      updateButton.addEventListener("click", () => updateWord(d.hanja, hanjaInput.value, readingInput.value));

      const deleteButton = document.createElement("button");
      deleteButton.type = "button";
      deleteButton.textContent = "삭제";
      deleteButton.addEventListener("click", () => deleteWord(d.hanja));

      card.appendChild(updateButton);
      card.appendChild(deleteButton);
    }

    list.appendChild(card);
  });

  list.appendChild(renderPagination(data.length));
}

/* 페이지 버튼 */
function renderPagination(total){

  const totalPages = Math.ceil(total / pageSize);
  const wrap = document.createElement("div");
  wrap.style.marginTop = "10px";

  for(let i=1;i<=totalPages;i++){
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = i;
    if (i === currentPage) button.style.fontWeight = "bold";
    button.addEventListener("click", () => goPage(i));
    wrap.appendChild(button);
  }

  return wrap;
}

/* 페이지 이동 */
window.goPage = function(page){
  currentPage = page;
  render(currentViewData);
}

/* 추가 */
window.addWord=async()=>{
  if(!isAdmin()) return alert("관리자만 가능");

  await setDoc(doc(db,"words",hanja.value.trim()),{
    hanja:hanja.value.trim(),
    reading:reading.value.trim()
  });

  loadList();
}

/* 수정 */
window.updateWord=async(oldId, hanjaValue, readingValue)=>{
  if(!isAdmin()) return;

  const newH=hanjaValue.trim();
  const newR=readingValue.trim();

  if(oldId!==newH){
    await deleteDoc(doc(db,"words",oldId));
  }

  await setDoc(doc(db,"words",newH),{
    hanja:newH,
    reading:newR
  });

  loadList();
}

/* 개별 삭제 */
window.deleteWord=async(id)=>{
  if(!isAdmin()) return;

  if(!confirm("삭제하시겠습니까?")) return;

  await deleteDoc(doc(db,"words",id));
  loadList();
}

/* 전체 삭제 */
window.deleteAll=async()=>{
  if(!isAdmin()) return;

  if(!confirm("전체 삭제하시겠습니까?")) return;

  const snap=await getDocs(collection(db,"words"));

  let batch = writeBatch(db);
  let count = 0;

  for(const d of snap.docs){
    batch.delete(d.ref);
    count++;

    if(count % 400 === 0){
      await batch.commit();
      batch = writeBatch(db);
    }
  }

  await batch.commit();

  alert(`삭제 완료: ${count}`);
  loadList();
}

/* CSV 업로드 */
window.uploadCSV=()=>{
  if(!isAdmin()) return;

  const file=csvFile.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=async(e)=>{

    const lines=e.target.result.split("\n");

    let total=lines.length-1;
    let done=0;

    for(let i=1;i<lines.length;i++){

      const [h,r]=lines[i].split(",");
      if(!h||!r) continue;

      await setDoc(doc(db,"words",h.trim()),{
        hanja:h.trim(),
        reading:r.trim()
      });

      done++;
      progress.innerText=`${Math.floor(done/total*100)}%`;
    }

    progress.innerText="완료";
    loadList();
  };

  reader.readAsText(file,"utf-8");
}

</script>

</body>
</html>
