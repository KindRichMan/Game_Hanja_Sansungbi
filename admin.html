<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>단어 등록</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
}

input {
  padding: 10px;
  margin: 10px;
  width: 250px;
}

button {
  padding: 10px 20px;
  margin: 5px;
}

#list {
  margin-top: 20px;
  text-align: left;
  display: inline-block;
}
</style>
</head>

<body>

<h2>📌 사자성어 등록</h2>

<button onclick="login()">🔐 로그인</button>
<button onclick="logout()">🚪 로그아웃</button>
<button onclick="loadList()">📋 데이터 조회</button>

<p id="result"></p>

<hr>

<input id="hanja" placeholder="한자 (예: 四面楚歌)">
<br>
<input id="reading" placeholder="뜻 (예: 사면초가)">
<br>

<button onclick="addWord()">추가</button>

<div id="list"></div>

<script type="module">

import { auth, provider, signInWithPopup } from "./firebase.js";
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

let user = null;

// 🔥 관리자 이메일
const admins = [
  "anghks12@gmail.com",
  "파트너이메일@gmail.com"
];

// 🔐 로그인
window.login = async function() {
  try {
    const result = await signInWithPopup(auth, provider);
    user = result.user;

    document.getElementById("result").innerText =
      "로그인됨: " + user.email;

  } catch (error) {
    console.error(error);
    alert("로그인 실패: " + error.message);
  }
}

// 🚪 로그아웃
window.logout = async function() {
  await signOut(auth);
  user = null;
  document.getElementById("result").innerText = "로그아웃됨";
}

// ➕ 단어 추가
window.addWord = async function() {

  if(!user){
    alert("로그인 필요");
    return;
  }

  if(!admins.includes(user.email)){
    alert("관리자만 추가 가능");
    return;
  }

  const hanja = document.getElementById("hanja").value.trim();
  const reading = document.getElementById("reading").value.trim();

  if(!hanja || !reading){
    alert("둘 다 입력하세요");
    return;
  }

  await addDoc(collection(db, "words"), {
    hanja,
    reading
  });

  document.getElementById("result").innerText = "✅ 저장 완료";

  document.getElementById("hanja").value = "";
  document.getElementById("reading").value = "";
}

// 📋 데이터 조회
window.loadList = async function() {

  const snapshot = await getDocs(collection(db, "words"));

  let html = "<h3>📚 저장된 사자성어</h3>";

  snapshot.forEach(doc => {
    const data = doc.data();
    html += `
      <div>
        <b>${data.hanja}</b> : ${data.reading}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

</script>

</body>
</html>
