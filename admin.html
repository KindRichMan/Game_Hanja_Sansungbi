<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사자성어 관리자</title>

<style>
body { font-family: sans-serif; text-align:center; padding:20px; }
button { margin:3px; padding:5px 10px; cursor:pointer; }

.card {
  border:1px solid #ddd;
  padding:10px;
  margin:5px auto;
  width:320px;
  border-radius:10px;
  text-align:left;
}

input { padding:5px; margin:3px; }
#progress { margin:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>📌 사자성어 관리자</h2>

<div>
  <button id="loginBtn" onclick="login()">로그인</button>
  <button id="logoutBtn" onclick="logout()" style="display:none;">로그아웃</button>
  <button onclick="loadList()">조회</button>
  <button id="deleteAllBtn" onclick="deleteAll()" style="display:none;">전체삭제</button>
</div>

<p id="result"></p>

<hr>

<input id="search" placeholder="검색">
<button onclick="searchList()">검색</button>

<hr>

<div id="adminArea" style="display:none;">
  <input type="file" id="csvFile">
  <button onclick="uploadCSV()">CSV 업로드</button>
  <div id="progress"></div>

  <hr>

  <input id="hanja" placeholder="한자">
  <input id="reading" placeholder="뜻">
  <button onclick="addWord()">추가</button>
</div>

<hr>

<div id="list"></div>

<script type="module">

import { auth, provider } from "./firebase.js";
import { db } from "./firebase.js";

import { 
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  doc, setDoc, getDocs, deleteDoc, collection, writeBatch 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 관리자 */
const admins = ["anghks12@gmail.com","dolsaen@gmail.com"];

let user=null;
let allData=[];

/* 페이징 */
let currentPage = 1;
const pageSize = 20;

/* 관리자 체크 */
function isAdmin(){
  return user && admins.includes(user.email);
}

/* 로그인 */
window.login = async () => {
  await setPersistence(auth, browserLocalPersistence);
  await signInWithRedirect(auth, provider);
};

/* 로그아웃 */
window.logout=async()=>{
  await signOut(auth);
  location.reload();
}

/* 🔥 로그인 결과 처리 */
getRedirectResult(auth).then((resultData)=>{
  if(resultData && resultData.user){
    user = resultData.user;
    applyLoginUI();
  }
});

/* 🔥 로그인 유지 */
onAuthStateChanged(auth,(u)=>{
  if(u){
    user = u;
    applyLoginUI();
  }
});

/* 로그인 UI */
function applyLoginUI(){
  result.innerText = user.email;

  loginBtn.style.display="none";
  logoutBtn.style.display="inline";

  if(isAdmin()){
    adminArea.style.display="block";
    deleteAllBtn.style.display="inline";
  }
}

/* 조회 */
window.loadList=async()=>{
  const snap=await getDocs(collection(db,"words"));

  allData=[];
  snap.forEach(d=>allData.push(d.data()));

  currentPage = 1;
  render(allData);
}

/* 검색 */
window.searchList=()=>{
  const keyword=search.value.trim();

  const filtered=allData.filter(d=>
    d.hanja.includes(keyword) || d.reading.includes(keyword)
  );

  currentPage = 1;
  render(filtered);
}

/* 렌더 */
function render(data){

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;

  const pageData = data.slice(start, end);

  let html="";

  pageData.forEach(d=>{
    html+=`
    <div class="card">
      <input value="${d.hanja}" id="h_${d.hanja}" ${!isAdmin()?"readonly":""}>
      <input value="${d.reading}" id="r_${d.hanja}" ${!isAdmin()?"readonly":""}>
      ${isAdmin()?`
        <button onclick="updateWord('${d.hanja}')">수정</button>
        <button onclick="deleteWord('${d.hanja}')">삭제</button>
      `:""}
    </div>
    `;
  });

  html += renderPagination(data.length);
  list.innerHTML = html;
}

/* 페이지 */
function renderPagination(total){
  const totalPages = Math.ceil(total / pageSize);
  let html = "<div>";

  for(let i=1;i<=totalPages;i++){
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }

  html += "</div>";
  return html;
}

window.goPage=(p)=>{
  currentPage=p;
  render(allData);
}

/* 추가 */
window.addWord=async()=>{
  if(!isAdmin()) return;

  await setDoc(doc(db,"words",hanja.value.trim()),{
    hanja:hanja.value.trim(),
    reading:reading.value.trim()
  });

  loadList();
}

/* 수정 */
window.updateWord=async(oldId)=>{
  if(!isAdmin()) return;

  const newH=h_"+oldId).value.trim();
  const newR=document.getElementById("r_"+oldId).value.trim();

  if(oldId!==newH){
    await deleteDoc(doc(db,"words",oldId));
  }

  await setDoc(doc(db,"words",newH),{
    hanja:newH,
    reading:newR
  });

  loadList();
}

/* 삭제 */
window.deleteWord=async(id)=>{
  if(!isAdmin()) return;

  if(!confirm("삭제하시겠습니까?")) return;

  await deleteDoc(doc(db,"words",id));
  loadList();
}

/* 전체 삭제 */
window.deleteAll=async()=>{
  if(!isAdmin()) return;

  if(!confirm("전체 삭제하시겠습니까?")) return;

  const snap=await getDocs(collection(db,"words"));

  let batch = writeBatch(db);
  let count = 0;

  for(const d of snap.docs){
    batch.delete(d.ref);
    count++;

    if(count % 400 === 0){
      await batch.commit();
      batch = writeBatch(db);
    }
  }

  await batch.commit();

  alert(`삭제 완료: ${count}`);
  loadList();
}

/* CSV */
window.uploadCSV=()=>{
  if(!isAdmin()) return;

  const file=csvFile.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=async(e)=>{
    const lines=e.target.result.split("\n");

    let total=lines.length-1;
    let done=0;

    for(let i=1;i<lines.length;i++){
      const [h,r]=lines[i].split(",");
      if(!h||!r) continue;

      await setDoc(doc(db,"words",h.trim()),{
        hanja:h.trim(),
        reading:r.trim()
      });

      done++;
      progress.innerText=`${Math.floor(done/total*100)}%`;
    }

    progress.innerText="완료";
    loadList();
  };

  reader.readAsText(file,"utf-8");
}

</script>

</body>
</html>
